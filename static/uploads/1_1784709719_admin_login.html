<!doctype html>
<html
  lang="en"
  class="h-full bg-neutral-950 text-neutral-200 antialiased selection:bg-sky-500 selection:text-white"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Authentication | Relay Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="min-h-screen flex flex-col items-center justify-center p-4 bg-neutral-950 font-sans">
    
    <main class="w-full max-w-sm">
      <div class="rounded-2xl border border-neutral-800/90 bg-neutral-900/50 backdrop-blur-md p-6 sm:p-8 text-center shadow-2xl shadow-black/80">
        
        <!-- Header Shield Icon -->
        <div class="w-12 h-12 mx-auto mb-4 rounded-xl bg-neutral-950 border border-neutral-800 flex items-center justify-center text-sky-400 text-lg shadow-inner">
          <i class="fa-solid fa-shield-halved"></i>
        </div>

        <h2 class="text-base sm:text-lg font-bold text-white tracking-tight">Admin Gateway</h2>
        <p class="mt-1 text-xs text-neutral-400">Enter master system passkey to open telemetry control.</p>
        
        <!-- Flash Warning Message -->
        {% with messages = get_flashed_messages(category_filter=["error"]) %}
          {% if messages %}
            {% for message in messages %}
              <div class="mt-4 p-2.5 rounded-xl bg-red-950/60 border border-red-500/20 text-red-400 text-xs font-semibold">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Form -->
        <form class="mt-6 flex flex-col gap-3" method="POST" action="{{ url_for('admin_bp.admin_login') }}">
          <div>
            <input 
              type="password" 
              name="admin_passkey"
              placeholder="System Passkey..." 
              required 
              autofocus
              class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-2.5 text-xs text-neutral-200 outline-none transition focus:border-sky-500/50 focus:ring-2 focus:ring-sky-500/20 placeholder-neutral-600 font-sans"
            />
          </div>
          
          <button 
            type="submit" 
            class="w-full bg-sky-600 hover:bg-sky-500 active:bg-sky-700 text-white font-semibold text-xs py-2.5 rounded-xl uppercase tracking-wider transition shadow-lg cursor-pointer"
          >
            Authenticate
          </button>
        </form>

        <div class="mt-6 pt-4 border-t border-neutral-800/60">
          <a href="{{ url_for('index') }}" class="text-[11px] text-neutral-500 hover:text-neutral-300 transition">
            <i class="fa-solid fa-arrow-left mr-1"></i> Return to Relay Hub
          </a>
        </div>

      </div>
    </main>

  </body>
</html>
